site_name: Taller R - Indicadores Agroclimáticos para Frijol
site_description: >-
  Taller práctico en R sobre el cálculo e interpretación de indicadores
  agroclimáticos para el cultivo de frijol en Honduras, orientado a
  mejoradores genéticos y técnicos agronómicos.
site_author: Camilo Barrios-Pérez & Andres Aguilar
site_url: https://cgiar-taller-agroclimatico-frijol.github.io/

repo_name: Taller_IndicesAgroclimaticos_Frijol
repo_url: https://github.com/cgiar-taller-agroclimatico-frijol

theme:
  name: material
  custom_dir: overrides
  language: es
  palette:
    - scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/weather-night
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/weather-sunny
        name: Cambiar a modo claro
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: es

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Inicio: index.md
  - Sesión 1 — Fundamentos y Entorno:
      - Introducción: sesion1/index.md
      - Marco Conceptual Agroclimático: sesion1/marco_conceptual.md
      - Indicadores Agroclimáticos — Conceptos Clave: sesion1/indicadores_conceptos.md
      - Configuración del Entorno en R: sesion1/configuracion_r.md
  - Sesión 2 — Datos Climáticos y de Suelos: sesion2/index.md
  - Sesión 3 — Cálculo de Indicadores: sesion3/index.md
  - Sesión 4 — Mapas y Zonificación: sesion4/index.md
  - Referencias: referencias.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cgiar

copyright: >
  Copyright &copy; 2026 CGIAR — Alliance of Bioversity International and CIAT
  · Universidad Zamorano
